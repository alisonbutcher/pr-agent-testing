name: Agentic Quality & Security Gate

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created, edited]

permissions:
  pull-requests: write
  issues: write
  contents: write

jobs:
  pr-agent-reviewer:
    runs-on: ubuntu-latest
    name: Autonomous Code Review
    if: ${{ github.event.sender.type != 'Bot' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR Agent
        uses: Codium-ai/pr-agent@v0.38.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC.KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          config.model: ${{ vars.PR_AGENT_MODEL || 'anthropic/claude-sonnet-4-6' }}
          config.fallback_models: '["${{ vars.PR_AGENT_FALLBACK_MODEL || 'anthropic/claude-haiku-4-5-20251001' }}"]'
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"

      - name: Enforce Quality Gate
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          sleep 5

          SCORE=$(gh api repos/${REPO}/issues/${PR_NUM}/comments \
            --jq '[.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("PR Reviewer Guide")) | .body] | last // ""' \
            | grep -oP '(?<=Score</strong>: )\d+' || true)

          if [ -z "$SCORE" ]; then
            echo "No PR-Agent score found — review may have been skipped."
            exit 0
          fi

          echo "PR-Agent score: ${SCORE}/100"

          MIN_SCORE="${{ vars.QUALITY_GATE_MIN_SCORE }}"
          MIN_SCORE="${MIN_SCORE:-60}"

          if [ "$SCORE" -lt "$MIN_SCORE" ]; then
            echo "❌ Quality gate FAILED: score ${SCORE}/100 is below minimum (${MIN_SCORE}/100)"
            exit 1
          fi

          echo "✅ Quality gate PASSED: score ${SCORE}/100 (minimum: ${MIN_SCORE}/100)"
