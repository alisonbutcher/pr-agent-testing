name: Agentic Quality & Security Gate

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created, edited]

permissions:
  pull-requests: write
  issues: write
  contents: write

jobs:
  pr-agent-reviewer:
    runs-on: ubuntu-latest
    name: Autonomous Code Review
    if: ${{ github.event.sender.type != 'Bot' }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Anthropic API Key
        run: |
          KEY="${{ secrets.ANTHROPIC_API_KEY }}"
          echo "Key length: ${#KEY}"
          echo "Key prefix: ${KEY:0:10}..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://api.anthropic.com/v1/models \
            -H "x-api-key: $KEY" \
            -H "anthropic-version: 2023-06-01")
          echo "API response code: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "ERROR: ANTHROPIC_API_KEY is invalid or missing"
            exit 1
          fi
          echo "API key verified OK"

      # 1. Automatically write the PR Description and Changelog
      - name: PR Agent - Describe
        uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Execute the strict architectural review using .pr_agent.toml rules
      - name: PR Agent - Review
        uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
